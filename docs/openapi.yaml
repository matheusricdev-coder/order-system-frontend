openapi: 3.0.3
info:
  title: Order System API
  version: 1.0.0
  description: >
    Mini-marketplace API built with Laravel + DDD/Clean Architecture.
    All order endpoints require a Bearer token obtained via /auth/login.
servers:
  - url: /api/v1
paths:
  /products:
    get:
      summary: List products
      tags: [Catalog]
      parameters:
        - in: query
          name: categoryId
          schema: { type: string, format: uuid }
        - in: query
          name: companyId
          schema: { type: string, format: uuid }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
      responses:
        '200': { description: Product list }
  /products/{id}:
    get:
      summary: Get product by id
      tags: [Catalog]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Product detail }
        '404':
          description: Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /categories:
    get:
      summary: List categories
      tags: [Catalog]
      responses:
        '200': { description: Category list }
  /companies/{id}:
    get:
      summary: Get company profile
      tags: [Catalog]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Company detail }
        '404':
          description: Company not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /companies/{id}/products:
    get:
      summary: List products by company
      tags: [Catalog]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Product list by company }
  /stocks/{productId}:
    get:
      summary: Get stock by product id
      tags: [Catalog]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Stock detail }
        '404':
          description: Stock not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /products/{id}/stock:
    get:
      summary: Get stock by product endpoint
      tags: [Catalog]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Stock detail }
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:     { type: string }
                email:    { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '201': { description: User created and token returned }
        '422':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /auth/login:
    post:
      summary: Login and receive bearer token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string }
      responses:
        '200': { description: Authenticated — returns bearer token }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /auth/logout:
    post:
      summary: Logout current user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '204': { description: Logged out }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /me:
    get:
      summary: Return authenticated user profile
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200': { description: Authenticated user }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /me/login-streak:
    get:
      summary: Return daily login streak for authenticated user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200': { description: Login streak data }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /orders:
    get:
      summary: List orders for authenticated user
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [created, paid, cancelled]
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: perPage
          schema: { type: integer, minimum: 1, maximum: 100, default: 15 }
      responses:
        '200': { description: Paginated order list }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Invalid filter value
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      summary: Create order
      tags: [Orders]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [productId, quantity]
                    properties:
                      productId: { type: string, format: uuid }
                      quantity:  { type: integer, minimum: 1 }
      responses:
        '201': { description: Order created }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Domain error (e.g. insufficient stock)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /orders/{id}:
    get:
      summary: Get order detail
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Order detail }
        '403':
          description: Access denied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Order not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /orders/{id}/pay:
    post:
      summary: Pay order
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Order paid }
        '403':
          description: Access denied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Order not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Invalid transition (e.g. already paid or cancelled)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /orders/{id}/cancel:
    post:
      summary: Cancel order
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Order cancelled }
        '403':
          description: Access denied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Order not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Invalid transition
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /health:
    get:
      summary: Health check — used by Railway and uptime monitors
      tags: [Infra]
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:    { type: string, example: ok }
                  timestamp: { type: string, format: date-time }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: ORDER_NOT_FOUND
              description: >
                Stable machine-readable error code. Known values:
                ORDER_NOT_FOUND, USER_NOT_FOUND, PRODUCT_NOT_FOUND,
                STOCK_NOT_FOUND, ORDER_ACCESS_DENIED, USER_INACTIVE,
                INVALID_ORDER_TRANSITION, INSUFFICIENT_STOCK,
                UNAUTHENTICATED, VALIDATION_ERROR, INTERNAL_ERROR.
            message:    { type: string }
            correlation_id: { type: string }
            details:
              type: object
              description: Field-level validation errors (present on VALIDATION_ERROR only)
